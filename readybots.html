<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ready Bots</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.webp">
<link rel="apple-touch-icon" href="favicon.webp">
</head>

<body>

<header>
<h1>البوتات الجاهزة</h1>
<a href="bots.html">⬅ رجوع</a>
</header>

<div class="container">

<div class="card">
<h2>بوت الادارة (افتح تكت للتفاصيل)</h2>
<p class="price">30000 Credit</p>
<button onclick="openBuy('بوت الادارة',30000)">شراء</button>
</div>

</div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="popup-content">
<h2 id="planName"></h2>
<input id="user" placeholder="يوزر ديسكورد">
<div id="commandBox"></div>
<button onclick="copy()">نسخ</button>
<button onclick="send()">تأكيد</button>
<button onclick="closePopup()">إلغاء</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
